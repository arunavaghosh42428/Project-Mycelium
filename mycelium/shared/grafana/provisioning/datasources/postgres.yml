apiVersion: 1

datasources:
  - name: Mycelium-PostgreSQL
    type: postgres
    url: postgres:5432
    database: mycelium
    user: mycelium
    secureJsonData:
      password: ${DB_PASSWORD:-mycelium_secret}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    isDefault: true
