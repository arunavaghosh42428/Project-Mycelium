# Rhizome NATS Configuration
# Project Mycelium – Decoy Network Backbone

port: 4222
http_port: 8222
server_name: mycelium_rhizome

# TLS (generate certs with: scripts/gen_certs.sh)
# tls {
#   cert_file: "/etc/nats/certs/server.crt"
#   key_file:  "/etc/nats/certs/server.key"
#   ca_file:   "/etc/nats/certs/ca.crt"
#   verify:    true
# }

# JetStream for persistent threat history
jetstream {
  store_dir: "/data"
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Accounts / auth (simple token for MVP)
authorization {
  token: "mycelium_rhizome_token_2025"
}

# Logging
log_time: true
debug: false
trace: false

# Subjects used by Project Mycelium:
#  threat.alert          – a Spore detected suspicious activity
#  threat.level          – current global threat level (low/medium/high)
#  command.banner_change – instruct Spores to change their banner
#  command.spawn         – AI Engine instructs spawner to add new Spores
#  canary.hit            – a canary token was triggered
#  metrics.spore.*       – heartbeat / metrics per Spore
